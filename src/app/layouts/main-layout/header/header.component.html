<p-toolbar styleClass="app-toolbar">
  <ng-template #start>
    <div class="header-start">
      <p-button
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        (onClick)="menuToggle.emit()"
      />
      <a class="header-brand" routerLink="/dashboard">
        <i class="pi pi-wallet brand-icon"></i>
        <span class="brand-name">BudgetWise</span>
      </a>
    </div>
  </ng-template>

  <ng-template #end>
    <div class="header-actions">
      <div class="language-switcher">
        @for (item of langOptions; track item.value) {
          <button
            type="button"
            class="lang-btn"
            [class.lang-btn--active]="lang.currentLang() === item.value"
            [pTooltip]="item.tooltipKey | translate"
            tooltipPosition="bottom"
            (click)="changeLanguage(item.value)"
          >
            {{ item.label }}
          </button>
        }
      </div>

      <p-button
        [icon]="layout.isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        (onClick)="layout.toggleDarkMode()"
      />

      <button class="user-trigger" (click)="userMenu.toggle($event)">
        <p-avatar
          [label]="userInitials()"
          shape="circle"
          styleClass="user-avatar"
        />
        <div class="user-info">
          <span class="user-name">{{ auth.currentUser()?.fullName }}</span>
          <span class="user-email">{{ auth.currentUser()?.email }}</span>
        </div>
        <i class="pi pi-chevron-down chevron"></i>
      </button>

      <p-menu #userMenu [model]="menuItems()" [popup]="true" />
    </div>
  </ng-template>
</p-toolbar>
