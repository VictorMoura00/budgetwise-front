<div class="not-found">
  <div class="not-found-content">
    <span class="not-found-code">404</span>
    <i class="pi pi-map not-found-icon"></i>
    <h1 class="not-found-title">{{ 'notFound.title' | translate }}</h1>
    <p class="not-found-subtitle">{{ 'notFound.subtitle' | translate }}</p>
    <p-button
      [label]="'notFound.back' | translate"
      icon="pi pi-home"
      routerLink="/dashboard"
    />
  </div>
</div>
